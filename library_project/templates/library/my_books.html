{% extends 'base.html' %}
{% block content %}

<h2>My Books</h2>

<table>
<tr>
<th>Book</th>
<th>Date</th>
<th>Return</th>
</tr>

{% for issue in issues %}
<tr>
<td>{{ issue.book.title }}</td>
<td>{{ issue.issue_date }}</td>
<td>
<a class="btn red" href="/return/{{ issue.id }}/">Return</a>
</td>
</tr>
{% empty %}
<tr><td colspan="3">No books</td></tr>
{% endfor %}

</table>

{% endblock %}
